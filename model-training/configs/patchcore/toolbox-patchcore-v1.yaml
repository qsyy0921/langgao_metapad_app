# PatchCore training config placeholder.
# Train only on normal samples under each ROI.
dataset_root: ../datasets/patchcore-v1

rois:
  - name: inner_area
    description: "盒内区域，用于检测铁屑、铝屑、多余螺栓等杂物"
    train_dir: inner_area/train/good
    val_dir: inner_area/val/good
    threshold: null
  - name: surface_area
    description: "接线盒端面，用于检测脏污、磕碰等缺陷"
    train_dir: surface_area/train/good
    val_dir: surface_area/val/good
    threshold: null

runtime:
  backbone: wide_resnet50_2
  input_size: 224
  coreset_ratio: 0.1
